version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: preventive_health
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      - POSTGRES_URL=postgresql://user:password@db:5432/preventive_health
      - JWT_SECRET_KEY=your-secret-key-here
    ports:
      - "8000:8000"
    depends_on:
      - db
    volumes:
      - ./backend:/app
      - ./diabetes_prediction_dataset.csv:/app/diabetes_prediction_dataset.csv

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data: